[phases.setup]
nixPkgs = ["python313"]

[phases.install]
cmds = ["python -m venv /opt/venv && /opt/venv/bin/pip install -r requirements.txt"]

[phases.build]
cmds = ["/opt/venv/bin/python manage.py collectstatic --noinput"]

[start]
cmd = "/opt/venv/bin/gunicorn multitask_backend.wsgi --bind 0.0.0.0:$PORT"
